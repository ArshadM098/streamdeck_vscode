name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v5.0.0)'
        required: true
        default: 'v5.0.0'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Package VS Code extension
        run: npm run pack -w vscode-streamdeck

      - name: Package Stream Deck plugin
        run: npm run pack -w @streamdeck-vscode/plugin

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./packages/vscode-extension/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Determine tag
        id: tag
        run: |
          if [[ '${{ github.event_name }}' == 'workflow_dispatch' ]]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }} (v${{ steps.version.outputs.version }})
          generate_release_notes: true
          files: |
            packages/vscode-extension/*.vsix
            packages/streamdeck-plugin/*.streamDeckPlugin
